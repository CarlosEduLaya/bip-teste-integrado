<div class="page-header">
  <h2>Transferência entre Benefícios</h2>
</div>

<div *ngIf="success" class="alert alert-success">{{ success }}</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<p *ngIf="loading" style="text-align:center;padding:32px;color:#888">Carregando...</p>

<div class="card" *ngIf="!loading">
  <form (ngSubmit)="submit()" #f="ngForm">
    <div class="form-row">
      <div class="form-group">
        <label for="fromId">Origem</label>
        <select id="fromId" name="fromId" [(ngModel)]="fromId" required>
          <option [ngValue]="null" disabled>Selecione...</option>
          <option *ngFor="let b of beneficios" [ngValue]="b.id">
            {{ b.nome }} — R$ {{ b.valor | number:'1.2-2':'pt-BR' }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="toId">Destino</label>
        <select id="toId" name="toId" [(ngModel)]="toId" required>
          <option [ngValue]="null" disabled>Selecione...</option>
          <option *ngFor="let b of beneficios" [ngValue]="b.id"
                  [disabled]="b.id === fromId">
            {{ b.nome }} — R$ {{ b.valor | number:'1.2-2':'pt-BR' }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="amount">Valor a transferir</label>
      <div class="input-prefix-wrapper">
        <span class="input-prefix">R$</span>
        <input
          id="amount"
          name="amount"
          [(ngModel)]="amountMascarado"
          (ngModelChange)="onAmountChange($event)"
          mask="separator.2"
          [dropSpecialCharacters]="false"
          thousandSeparator="."
          decimalMarker=","
          required
          placeholder="0,00"
        />
      </div>
    </div>

    <button type="submit" class="btn btn-success"
            [disabled]="f.invalid || submitting || fromId === toId || amountNumerico <= 0">
      {{ submitting ? 'Transferindo...' : 'Transferir' }}
    </button>
  </form>
</div>

<!-- Tabela de saldos atuais -->
<div class="card" *ngIf="beneficios.length">
  <h3 style="margin-bottom:16px;font-size:1rem;color:#555">Saldos atuais</h3>
  <table>
    <thead>
      <tr><th>#</th><th>Nome</th><th>Saldo (R$)</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of beneficios">
        <td>{{ b.id }}</td>
        <td>{{ b.nome }}</td>
        <td>{{ b.valor | number:'1.2-2':'pt-BR' }}</td>
      </tr>
    </tbody>
  </table>
</div>
