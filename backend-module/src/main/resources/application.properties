# ─── Servidor ────────────────────────────────────────────────────────────────
server.port=8080

# ─── Banco de dados (H2 em memória – dev/CI) ──────────────────────────────────
spring.datasource.url=jdbc:h2:mem:bipdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Garante que o Hibernate cria as tabelas antes de o Spring executar data.sql
spring.jpa.defer-datasource-initialization=true

# Seed de dados (src/main/resources/data.sql)
spring.sql.init.mode=always

# Console H2 (apenas desenvolvimento)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── PostgreSQL (ativar com spring.profiles.active=postgres) ──────────────────
# spring.datasource.url=jdbc:postgresql://localhost:5432/bipdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate
# spring.sql.init.mode=never

# ─── CORS (frontend Angular em :4200) ────────────────────────────────────────
spring.web.cors.allowed-origins=http://localhost:4200

# ─── Swagger / OpenAPI ───────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
