name: CI

on: [push, pull_request]

jobs:
  # ── EJB Module ──────────────────────────────────────────────────────────────
  ejb:
    name: EJB Module – compile & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build & test EJB module
        run: mvn -B -f ejb-module/pom.xml clean verify

  # ── Backend Module ───────────────────────────────────────────────────────────
  backend:
    name: Backend Module – build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build & test backend
        run: mvn -B -f backend-module/pom.xml clean verify

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build Angular app
        run: npm run build
        working-directory: frontend
